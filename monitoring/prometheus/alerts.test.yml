rule_files:
  - alerts.yml

evaluation_interval: 1m

tests:
  - interval: 1m
    input_series:
      - series: 'up{job="system-monitor-backend"}'
        values: '0+0x6'
    alert_rule_test:
      - eval_time: 2m
        alertname: SystemMonitorBackendDown
        exp_alerts:
          - exp_labels:
              severity: critical

  - interval: 1m
    input_series:
      - series: 'system_monitor_cpu_usage_percent'
        values: '90+0x6'
      - series: 'system_monitor_memory_usage_percent'
        values: '20+0x6'
      - series: 'system_monitor_disk_usage_percent'
        values: '20+0x6'
      - series: 'up{job="system-monitor-backend"}'
        values: '1+0x6'
    alert_rule_test:
      - eval_time: 3m
        alertname: SystemMonitorHighCPUUsage
        exp_alerts:
          - exp_labels:
              severity: warning

  - interval: 1m
    input_series:
      - series: 'system_monitor_http_requests_total{status="500",method="GET",path="/api/metrics/latest"}'
        values: '0 10 20 30 40 50 60'
      - series: 'system_monitor_http_requests_total{status="200",method="GET",path="/api/metrics/latest"}'
        values: '0 30 60 90 120 150 180'
      - series: 'up{job="system-monitor-backend"}'
        values: '1+0x6'
    alert_rule_test:
      - eval_time: 6m
        alertname: SystemMonitorHighHTTP5xxRatio
        exp_alerts:
          - exp_labels:
              severity: critical
