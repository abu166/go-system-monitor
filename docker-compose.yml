services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: system-monitor-backend
    restart: unless-stopped
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-8080}
      BACKEND_HISTORY_LIMIT: ${BACKEND_HISTORY_LIMIT:-100}
      BACKEND_READ_TIMEOUT: ${BACKEND_READ_TIMEOUT:-5s}
      BACKEND_WRITE_TIMEOUT: ${BACKEND_WRITE_TIMEOUT:-5s}
      BACKEND_SHUTDOWN_TIMEOUT: ${BACKEND_SHUTDOWN_TIMEOUT:-10s}
      BACKEND_DISK_PATH: ${BACKEND_DISK_PATH:-/}
      BACKEND_STREAM_INTERVAL: ${BACKEND_STREAM_INTERVAL:-3s}
      BACKEND_HISTORY_FILE: ${BACKEND_HISTORY_FILE:-/app/data/metrics-history.jsonl}
      BACKEND_CPU_ALERT_THRESHOLD: ${BACKEND_CPU_ALERT_THRESHOLD:-85}
      BACKEND_MEMORY_ALERT_THRESHOLD: ${BACKEND_MEMORY_ALERT_THRESHOLD:-85}
      BACKEND_DISK_ALERT_THRESHOLD: ${BACKEND_DISK_ALERT_THRESHOLD:-90}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - backend_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: system-monitor-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: system-monitor-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      backend:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.2.2
    container_name: system-monitor-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/provisioning/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus

volumes:
  backend_data:
  grafana_data:
