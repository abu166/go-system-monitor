name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go mod tidy
      - run: go test ./...
      - name: Validate Prometheus alert rules
        run: |
          docker run --rm \
            --entrypoint /bin/promtool \
            -v ${{ github.workspace }}/monitoring/prometheus:/rules \
            prom/prometheus:v2.55.1 \
            test rules /rules/alerts.test.yml
      - name: Validate Alertmanager config
        run: |
          docker run --rm \
            --entrypoint /bin/amtool \
            -v ${{ github.workspace }}/monitoring/alertmanager:/cfg \
            prom/alertmanager:v0.27.0 \
            check-config /cfg/alertmanager.yml

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package.json
      - run: npm install
      - run: npm run build
      - run: npm test

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package.json
      - name: Prepare Go modules
        working-directory: backend
        run: go mod tidy
      - name: Go vulnerability scan
        working-directory: backend
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: Frontend dependency audit
        working-directory: frontend
        run: |
          npm install
          npm audit --audit-level=high
      - name: Build images for image scanning
        run: docker compose build backend frontend
      - name: Trivy scan backend image
        run: |
          BACKEND_IMAGE_ID=$(docker compose images -q backend)
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.57.1 image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            "$BACKEND_IMAGE_ID"
      - name: Trivy scan frontend image
        run: |
          FRONTEND_IMAGE_ID=$(docker compose images -q frontend)
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.57.1 image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            "$FRONTEND_IMAGE_ID"

  integration-and-load:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and run stack
        run: docker compose up -d --build backend frontend
      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend health check failed"
          exit 1
      - name: Run e2e smoke
        run: ./tests/e2e/smoke.sh
      - name: Run k6 load smoke
        run: |
          docker run --rm \
            --network go-system-monitor_default \
            -e BASE_URL=http://backend:8080 \
            -v ${{ github.workspace }}/tests/load:/scripts \
            grafana/k6:0.56.0 run /scripts/k6-smoke.js
      - name: Teardown
        if: always()
        run: docker compose down -v
